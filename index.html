<!DOCTYPE html>
<html>
<head>
    <title>Lost Phone Helper</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 360px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        .report {
            border-top: 1px solid #ddd;
            margin-top: 10px;
            padding-top: 10px;
            text-align: left;
        }

        a {
            color: #007bff;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>📱 Lost Phone Helper</h2>

    <p>If you found this phone, please help return it 🙏</p>

    <input type="email" id="email" placeholder="Enter your email">
    <input type="text" id="phone" placeholder="Enter phone number">

    <button onclick="getLocation()">Share & Send Report</button>

    <div id="output"></div>
</div>

<script>
function getLocation() {
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;

    if (!email || !phone) {
        alert("Please enter email and phone number");
        return;
    }

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {

            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

            let mapLink = "https://www.google.com/maps?q=" + lat + "," + lon;

            let subject = "Lost Phone Location Report";
            let body =
                "Email: " + email + "%0D%0A" +
                "Phone: " + phone + "%0D%0A" +
                "Location: " + mapLink + "%0D%0A";

            let mailtoLink = "mailto:?subject=" + subject + "&body=" + body;

            document.getElementById("output").innerHTML =
                "<h3>📍 Report Ready</h3>" +
                "<p>Click below to send report via email:</p>" +
                "<a href='" + mailtoLink + "'>📧 Send Email Report</a>";

        }, function() {
            alert("Location access denied");
        });

    } else {
        alert("Geolocation not supported");
    }
}
</script>

</body>
</html>
