<!DOCTYPE html>
<html>
<head>
    <title>Lost Phone Helper</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 340px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        .report {
            border-top: 1px solid #ddd;
            margin-top: 10px;
            padding-top: 10px;
            text-align: left;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>📱 Lost Phone Helper</h2>

    <p>If you found this phone, please help return it 🙏</p>

    <input type="email" id="email" placeholder="Enter your email">

    <button onclick="getLocation()">Share Location</button>

    <button onclick="clearReports()" style="margin-top:10px;background:red;">
        Clear Reports
    </button>

    <div id="output"></div>
</div>

<script>
let reports = JSON.parse(localStorage.getItem("reports")) || [];

displayReports();

function getLocation() {
    const email = document.getElementById("email").value;

    if (!email) {
        alert("Please enter your email");
        return;
    }

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {

            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

            let mapLink = "https://www.google.com/maps?q=" + lat + "," + lon;

            let report = {
                email: email,
                location: mapLink,
                time: new Date().toLocaleString()
            };

            reports.push(report);

            localStorage.setItem("reports", JSON.stringify(reports));

            displayReports();

        }, function() {
            alert("Location access denied");
        });

    } else {
        alert("Geolocation not supported");
    }
}

function displayReports() {
    let output = "<h3>📍 Saved Reports</h3>";

    for (let i = 0; i < reports.length; i++) {
        output += `
            <div class="report">
                <p><b>Email:</b> ${reports[i].email}</p>
                <p><b>Time:</b> ${reports[i].time}</p>
                <a href="${reports[i].location}" target="_blank">🌍 Open Location</a>
            </div>
        `;
    }

    document.getElementById("output").innerHTML = output;
}

function clearReports() {
    localStorage.removeItem("reports");
    reports = [];
    displayReports();
}
</script>

</body>
</html>
