<!DOCTYPE html>
<html>
<head>
    <title>Lost Phone Helper</title>

    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .phone {
            width: 360px;
            height: 640px;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2563eb;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        .content {
            padding: 15px;
            flex: 1;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #appScreen {
            display: none;
        }

        .logout {
            background: red;
        }
    </style>
</head>

<body>

<div class="phone">

    <div class="header">📱 Lost Phone Helper</div>

    <!-- GOOGLE LOGIN SCREEN -->
    <div class="content" id="loginScreen">
        <h3>Sign in with Google</h3>

        <div id="g_id_onload"
             data-client_id="952278725761-rt258isf778i37lta49m3hr67thjk4kc.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>

        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <!-- APP SCREEN -->
    <div class="content" id="appScreen">
        <p id="userInfo"></p>

        <input type="email" id="email" placeholder="Enter email">
        <input type="text" id="phone" placeholder="Enter phone">

        <button onclick="sendReport()">Share Location</button>
        <button class="logout" onclick="logout()">Logout</button>

        <div id="output"></div>
    </div>

</div>

<script>
// 🔐 CHECK IF USER ALREADY LOGGED IN
window.onload = function() {
    let savedUser = localStorage.getItem("user");

    if (savedUser) {
        showApp(JSON.parse(savedUser));
    }
};

// ✅ HANDLE GOOGLE LOGIN
function handleCredentialResponse(response) {
    const data = parseJwt(response.credential);

    // Save user locally (so it stays logged in)
    localStorage.setItem("user", JSON.stringify(data));

    showApp(data);
}

// 🔓 SHOW APP
function showApp(user) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appScreen").style.display = "block";

    document.getElementById("userInfo").innerHTML =
        "👤 " + user.name + "<br>📧 " + user.email;
}

// 🔐 LOGOUT
function logout() {
    localStorage.removeItem("user");
    location.reload();
}

// 🧠 DECODE GOOGLE TOKEN
function parseJwt(token) {
    let base64Url = token.split('.')[1];
    let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));

    return JSON.parse(jsonPayload);
}

// 📍 LOCATION FUNCTION
function sendReport() {
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;

    if (!email || !phone) {
        alert("Fill all fields");
        return;
    }

    navigator.geolocation.getCurrentPosition(function(position) {

        let lat = position.coords.latitude;
        let lon = position.coords.longitude;

        let mapLink = "https://www.google.com/maps?q=" + lat + "," + lon;

        document.getElementById("output").innerHTML =
            "📍 Report Sent<br>" +
            "<a target='_blank' href='" + mapLink + "'>Open Map</a>";

    }, function() {
        alert("Location denied");
    });
}
</script>

</body>
</html>
