<!DOCTYPE html>
<html>
<head>
    <title>Lost Phone Helper</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .phone {
            width: 360px;
            height: 640px;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2563eb;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        .content {
            padding: 15px;
            flex: 1;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .logout {
            background: red;
        }

        .report {
            background: #f1f5f9;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
        }

        a {
            color: #2563eb;
            font-weight: bold;
        }

        #appScreen {
            display: none;
        }
    </style>
</head>

<body>

<div class="phone">

    <div class="header">📱 Lost Phone Helper</div>

    <!-- LOGIN SCREEN -->
    <div class="content" id="loginScreen">
        <h3>Login</h3>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>
    </div>

    <!-- APP SCREEN -->
    <div class="content" id="appScreen">
        <p style="font-size:13px;color:gray;">
            Share your location to help return phone 🙏
        </p>

        <input type="email" id="email" placeholder="Enter email">
        <input type="text" id="phone" placeholder="Enter phone number">

        <button onclick="sendReport()">Share Location</button>
        <button class="logout" onclick="logout()">Logout</button>

        <div id="output"></div>
    </div>

</div>

<script>
// CHECK LOGIN STATUS
if (localStorage.getItem("loggedIn") === "true") {
    showApp();
}

// LOGIN FUNCTION
function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    // Simple login (you can change credentials)
    if (username === "admin" && password === "1234") {
        localStorage.setItem("loggedIn", "true");
        showApp();
    } else {
        alert("Wrong username or password");
    }
}

// SHOW APP
function showApp() {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appScreen").style.display = "block";
}

// LOGOUT
function logout() {
    localStorage.removeItem("loggedIn");
    location.reload();
}

// SEND REPORT (same functionality)
function sendReport() {
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;

    if (!email || !phone) {
        alert("Fill all fields");
        return;
    }

    navigator.geolocation.getCurrentPosition(function(position) {

        let lat = position.coords.latitude;
        let lon = position.coords.longitude;

        let mapLink = "https://www.google.com/maps?q=" + lat + "," + lon;

        document.getElementById("output").innerHTML =
            "<div class='report'>" +
            "<b>📍 Report Sent</b><br><br>" +
            "Email: " + email + "<br>" +
            "Phone: " + phone + "<br><br>" +
            "<a target='_blank' href='" + mapLink + "'>Open Location</a>" +
            "</div>";

    }, function() {
        alert("Location denied");
    });
}
</script>

</body>
</html>
