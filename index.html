<!DOCTYPE html>
<html>
<head>
    <title>Lost Phone Helper</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone {
            width: 360px;
            height: 640px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2563eb;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .content {
            padding: 15px;
            flex: 1;
            overflow-y: auto;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .report {
            background: #f1f5f9;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            font-size: 14px;
        }

        a {
            color: #2563eb;
            font-weight: bold;
            text-decoration: none;
        }

        .footer {
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="phone">

    <div class="header">
        📱 Lost Phone Helper
    </div>

    <div class="content">

        <p style="font-size:13px;color:gray;">
            Help return this phone by sharing your location 🙏
        </p>

        <input type="email" id="email" placeholder="Enter email">
        <input type="text" id="phone" placeholder="Enter phone number">

        <button onclick="sendReport()">Share Location</button>

        <div id="output"></div>

    </div>

    <div class="footer">
        Powered by Lost Phone Helper
    </div>

</div>

<script>
function sendReport() {
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;

    if (!email || !phone) {
        alert("Please fill all fields");
        return;
    }

    navigator.geolocation.getCurrentPosition(function(position) {

        let lat = position.coords.latitude;
        let lon = position.coords.longitude;

        let mapLink = "https://www.google.com/maps?q=" + lat + "," + lon;

        document.getElementById("output").innerHTML =
            "<div class='report'>" +
            "<b>📍 Report Sent</b><br><br>" +
            "Email: " + email + "<br>" +
            "Phone: " + phone + "<br><br>" +
            "<a target='_blank' href='" + mapLink + "'>Open Location</a>" +
            "</div>";

    }, function() {
        alert("Location access denied");
    });
}
</script>

</body>
</html>
