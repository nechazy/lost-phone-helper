<!DOCTYPE html>
<html>
<head>
    <title>Lost Phone Helper</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 360px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        a {
            color: #007bff;
            font-weight: bold;
            text-decoration: none;
        }

        #output {
            margin-top: 15px;
            text-align: left;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>📱 Lost Phone Helper</h2>

    <p>Share your location to help return the phone 🙏</p>

    <input type="email" id="email" placeholder="Enter email">
    <input type="text" id="phone" placeholder="Enter phone number">

    <button onclick="sendReport()">Share Location</button>

    <div id="output"></div>
</div>

<script>
async function sendReport() {
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;

    if (!email || !phone) {
        alert("Please fill in email and phone number");
        return;
    }

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async function(position) {

            let latitude = position.coords.latitude;
            let longitude = position.coords.longitude;

            let data = {
                email: email,
                phone: phone,
                latitude: latitude,
                longitude: longitude
            };

            // Send data to backend
            await fetch("http://localhost:3000/report", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            let mapLink = "https://www.google.com/maps?q=" + latitude + "," + longitude;

            document.getElementById("output").innerHTML =
                "<h3>📍 Report Sent Successfully</h3>" +
                "<p><b>Email:</b> " + email + "</p>" +
                "<p><b>Phone:</b> " + phone + "</p>" +
                "<a href='" + mapLink + "' target='_blank'>🌍 Open Location in Google Maps</a>";

        }, function() {
            alert("Location access denied");
        });

    } else {
        alert("Geolocation not supported");
    }
}
</script>

</body>
</html>
